name: Deploy Secure E-Commerce App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: 'app-ecom-dev-xxxxx'  # Set from deployment output
  NODE_VERSION: '18.x'
  WORKING_DIRECTORY_BACKEND: './app/backend'
  WORKING_DIRECTORY_FRONTEND: './app/frontend'

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIRECTORY_BACKEND }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY_BACKEND }}
        run: npm ci

      - name: Run tests
        working-directory: ${{ env.WORKING_DIRECTORY_BACKEND }}
        run: npm test --if-present

      - name: Upload backend artifact
        uses: actions/upload-artifact@v3
        with:
          name: backend
          path: ${{ env.WORKING_DIRECTORY_BACKEND }}

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIRECTORY_FRONTEND }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY_FRONTEND }}
        run: npm ci

      - name: Build frontend
        working-directory: ${{ env.WORKING_DIRECTORY_FRONTEND }}
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          REACT_APP_AZURE_AD_B2C_CLIENT_ID: ${{ secrets.REACT_APP_AZURE_AD_B2C_CLIENT_ID }}
          REACT_APP_AZURE_AD_B2C_TENANT_NAME: ${{ secrets.REACT_APP_AZURE_AD_B2C_TENANT_NAME }}
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v3
        with:
          name: frontend
          path: ${{ env.WORKING_DIRECTORY_FRONTEND }}/build

  deploy-infrastructure:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep
        uses: azure/arm-deploy@v1
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ secrets.AZURE_RESOURCE_GROUP }}
          template: ./infrastructure/bicep/main.bicep
          parameters: >
            environmentName=dev
            location=centralindia
            sqlAdminPassword=${{ secrets.SQL_ADMIN_PASSWORD }}

  deploy-backend:
    name: Deploy Backend to Azure
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v3
        with:
          name: backend
          path: ./backend

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ./backend

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v3
        with:
          name: frontend
          path: ./frontend

      # Deploy to Azure Storage Static Website or App Service
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Upload to Azure Blob Storage
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az storage blob upload-batch \
              --account-name ${{ secrets.STORAGE_ACCOUNT_NAME }} \
              --destination '$web' \
              --source ./frontend \
              --overwrite